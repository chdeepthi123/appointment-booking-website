<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Appointment</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header>
    <nav class="navbar">
        <div class="logo">QuickBook</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
        </ul>
    </nav>
</header>

<section class="booking-section">
    <h2>Book Your Appointment</h2>

    <form id="bookingForm">

        <label>Select Date</label>
        <input type="date" id="date" required>

        <label>Select Time Slot</label>
        <div class="time-slots">
            <button type="button" class="time-slot">10:00 AM</button>
            <button type="button" class="time-slot">12:00 PM</button>
            <button type="button" class="time-slot">02:00 PM</button>
            <button type="button" class="time-slot">04:00 PM</button>
        </div>

        <label>Name</label>
        <input type="text" id="name" required>

        <label>Email</label>
        <input type="email" id="email" required>

        <label>Phone</label>
        <input type="text" id="phone" required>

        <button type="submit" class="btn">Confirm Booking</button>

    </form>

    <div id="summary" class="summary"></div>
</section>

<script src="js/script.js"></script>
</body>
</html>
